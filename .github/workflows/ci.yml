name: CI

# Runs on every push to main and every PR targeting main.
# Branch protection on main requires this workflow to pass before merge.
#
# The SwiftPM build gives a fast source typecheck; the Xcode build
# exercises the real checked-in iOS app target, Info.plist, SPM
# linkage, and xcconfig wiring without requiring signing secrets.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build (library target via SwiftPM)
        run: swift build

      - name: Prepare Xcode config
        run: cp Config.xcconfig.example Config.xcconfig

      - name: Build (iOS app target via Xcode)
        run: |
          xcodebuild \
            -project jobs-ios.xcodeproj \
            -scheme jobs-ios \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build
